title: 每日早报
layout: page
comments: false

<style>
    /* 样式隔离 wrapper */
    #zb-news-wrapper {
        background: linear-gradient(135deg, #ffeef8 0%, #fff5e6 100%);
        background-attachment: fixed;
        padding: 30px 20px;
        color: #2d2d2d;
        line-height: 1.7;
        position: relative;
        border-radius: 24px;
        overflow: hidden;
        box-sizing: border-box;
    }

    /* 背景点缀图案 */
    #zb-news-wrapper::before {
        content: "";
        position: absolute;
        top: -50%;
        right: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255, 107, 157, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
    }

    /* 变量定义 */
    #zb-news-wrapper {
        --primary-color: #ff6b9d;
        --primary-dark: #ff4d88;
        --accent-color: #ffd93d;
        --card-bg: #ffffff;
        --text-main: #2d2d2d; 
        --shadow-soft: 0 10px 40px rgba(255, 107, 157, 0.15);
        --shadow-hover: 0 15px 50px rgba(255, 107, 157, 0.25);
    }

    /* 主卡片 */
    .zb-container {
        max-width: 850px;
        margin: 0 auto;
        background: var(--card-bg);
        border-radius: 24px;         box-shadow: var(--shadow-soft);
        overflow: hidden;
        min-height: 500px;
        position: relative;
        z-index: 1;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .zb-container:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-hover);
    }

    /* 头部区域 */
    .zb-header-image {
        width: 100%;
        height: auto;
        display: block;
        background: linear-gradient(135deg, #ffe9f5 0%, #fff8e1 100%);
    }
    .zb-header-content {
        padding: 30px 40px 15px;
        border-bottom: 2px solid transparent;
        background: linear-gradient(to right, rgba(255, 107, 157, 0.05), rgba(255, 217, 61, 0.05));
        position: relative;
    }
    .zb-header-content::before {
        content: "✨";
        position: absolute;
        top: 15px;
        left: 15px;
        font-size: 1.5rem;
        animation: zb-sparkle 2s ease-in-out infinite;
    }
    @keyframes zb-sparkle {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.2); }
    }

    /* 日期标签 */
    .zb-date-tag {
        display: inline-block;
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
        color: white;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 0.95rem;
        font-weight: bold;
        margin-bottom: 12px;
        box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3);
        position: relative;        overflow: hidden;
    }
    .zb-date-tag::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        transition: left 0.5s;
    }
    .zb-date-tag:hover::before {
        left: 100%;
    }

    /* 标题 */
    .zb-main-title {
        margin: 0;
        font-size: 2.3rem;
        background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.5px;
        font-weight: 900;
    }

    /* 音频播放器 */
    .zb-audio-player {
        margin: 25px 40px;
        background: linear-gradient(135deg, #fff0f7 0%, #fffbeb 100%);
        border-radius: 16px;
        padding: 15px;
        border: 2px solid rgba(255, 107, 157, 0.1);
        box-shadow: 0 4px 15px rgba(255, 107, 157, 0.08);
    }
    .zb-audio-player audio { 
        width: 100%; 
        height: 45px;
        border-radius: 10px;
    }

    /* 新闻列表 */
    .zb-news-list { 
        padding: 0 40px 40px; 
        list-style: none; 
        margin: 0; 
    }
    .zb-news-item {        padding: 20px 0;
        border-bottom: 1px solid rgba(255, 107, 157, 0.1); 
        font-size: 1.25rem; 
        line-height: 1.8;  
        color: var(--text-main);
        display: flex;
        align-items: flex-start;
        text-align: justify;
        transition: transform 0.2s ease, padding-left 0.2s ease;
        position: relative;
    }        
    .zb-news-item::before {
        content: "🌸";
        position: absolute;
        left: -25px;
        opacity: 0;
        transition: opacity 0.2s, left 0.2s;
    }
    .zb-news-item:hover {
        transform: translateX(5px);
        padding-left: 10px;
    }
    .zb-news-item:hover::before {
        opacity: 1;
        left: -15px;
    }
    .zb-news-item:last-child { 
        border-bottom: none; 
    }
    .zb-news-index {
        font-weight: 900;
        background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-right: 15px;
        min-width: 30px;
        font-size: 1.4rem; 
        line-height: 1.8;
    }

    /* 微语部分 */
    .zb-weiyu-section {
        background: linear-gradient(135deg, #fff5fb 0%, #fffef5 100%);
        border-left: 6px solid var(--primary-color);
        margin: 25px 40px;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(255, 107, 157, 0.1);
        position: relative;    }
    .zb-weiyu-section::before {
        content: "💭";
        position: absolute;
        top: -10px;
        right: 20px;
        font-size: 2rem;
    }
    .zb-weiyu-text {
        font-size: 1.2rem; 
        font-style: italic;
        color: #555;
        margin: 0;
        font-weight: 500;
    }

    /* 加载与状态 */
    .zb-loading, .zb-error-msg {
        text-align: center;
        padding: 80px 20px;
        color: #999;
        font-size: 1.3rem;
    }
    .zb-loading::after {
        content: "";
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid var(--primary-color);
        border-radius: 50%;
        border-top-color: transparent;
        animation: zb-spin 1s linear infinite;
        margin-left: 10px;
        vertical-align: middle;
    }
    @keyframes zb-spin {
        to { transform: rotate(360deg); }
    }
    .zb-error-msg { 
        color: var(--primary-color);
        font-weight: bold;
    }
    .zb-status-badge {
        position: absolute;
        top: 25px;
        right: 25px;
        font-size: 11px;
        color: #999;
        background: rgba(255, 255, 255, 0.95);
        padding: 4px 12px;        border-radius: 20px;
        border: 1px solid rgba(255, 107, 157, 0.2);
        box-shadow: 0 2px 8px rgba(255, 107, 157, 0.1);
        z-index: 10;
    }

    /* 移动端适配 */
    @media (max-width: 600px) {
        #zb-news-wrapper { 
            padding: 0; 
            background: linear-gradient(135deg, #ffeef8 0%, #fff5e6 100%);
            overflow-x: hidden;
            border-radius: 0;
        }
        .zb-container { 
            margin: 20px auto; 
            width: 92%;
            max-width: 92%;
            background: var(--card-bg); 
            box-shadow: var(--shadow-soft); 
            border-radius: 20px; 
            position: relative;
        }
        .zb-container:hover { transform: none; }
        .zb-news-list, .zb-header-content, .zb-weiyu-section, .zb-audio-player { 
            padding-left: 20px; 
            padding-right: 20px; 
        }
        .zb-news-item { font-size: 1.1rem; }
        .zb-main-title { font-size: 1.8rem; }
        .zb-header-content { padding: 25px 20px 15px; }
        .zb-audio-player, .zb-weiyu-section { margin: 20px; }
    }
</style>

<div id="zb-news-wrapper">
    <div class="zb-container">
        <div id="zb-status-display" class="zb-status-badge" style="display:none;"></div>

        <div id="zb-loading" class="zb-loading">
            正在加载今日早报...
        </div>

        <div id="zb-content" style="display: none;">
            <img id="zb-head-img" class="zb-header-image" src="" alt="Header">

            <div class="zb-header-content">
                <span id="zb-date-display" class="zb-date-tag"></span>
                <h1 class="zb-main-title">每日早报</h1>
            </div>
            <div class="zb-audio-player" id="zb-audio-box" style="display: none;">
                <audio id="zb-audio-control" controls></audio>
            </div>

            <div class="zb-weiyu-section">
                <p id="zb-weiyu-text" class="zb-weiyu-text"></p>
            </div>

            <ul id="zb-news-list" class="zb-news-list">
            </ul>
        </div>
    </div>
</div>

<script>
    (function() {
        // 配置项：请确保 data.json 放在 Hexo 的 source 目录下，或者修改此处路径
        // 如果放在 source/data.json，通常访问路径是 '/data.json'
        const API_ENDPOINT = '/data.json'; 
        const CACHE_KEY = 'zb_news_local_data';

        function initZbNews() {
            const loadingEl = document.getElementById('zb-loading');
            const contentEl = document.getElementById('zb-content');
            const statusEl = document.getElementById('zb-status-display');

            // 1. 尝试从本地缓存加载
            const cachedDataStr = localStorage.getItem(CACHE_KEY);
            let hasRenderedCache = false;

            if (cachedDataStr) {
                try {
                    const cachedData = JSON.parse(cachedDataStr);
                    const today = new Date().toISOString().split('T')[0]; 

                    if (cachedData.date === today) {
                        renderZbData(cachedData);
                        hasRenderedCache = true;
                        loadingEl.style.display = 'none';
                        contentEl.style.display = 'block';
                        statusEl.textContent = '已缓存';
                        statusEl.style.display = 'block';
                        return; 
                    } else {
                        // 缓存过期，先渲染旧数据避免白屏
                        renderZbData(cachedData);
                        hasRenderedCache = true;
                        loadingEl.style.display = 'none';
                        contentEl.style.display = 'block';                        statusEl.textContent = '更新中...';
                        statusEl.style.display = 'block';
                    }

                } catch (e) {
                    console.error('Cache parse error', e);
                    localStorage.removeItem(CACHE_KEY);
                }
            }

            // 2. 发起网络请求
            fetchZbData(loadingEl, contentEl, statusEl, hasRenderedCache);
        }

        async function fetchZbData(loadingEl, contentEl, statusEl, hasRenderedCache) {
            try {
                const timestamp = new Date().getTime();
                const response = await fetch(`${API_ENDPOINT}?t=${timestamp}`);
                const result = await response.json();

                if (result.code === 200 || result.success === true) {
                    renderZbData(result.data);
                    localStorage.setItem(CACHE_KEY, JSON.stringify(result.data));
                    loadingEl.style.display = 'none';
                    contentEl.style.display = 'block';
                    statusEl.style.display = 'none';
                } else {
                    if (!hasRenderedCache) {
                        loadingEl.innerHTML = `<div class="zb-error-msg">加载失败：${result.msg || result.message}</div>`;
                    }
                }
            } catch (error) {
                console.error('Fetch error:', error);
                if (!hasRenderedCache) {
                    loadingEl.innerHTML = `<div class="zb-error-msg">网络错误，请稍后重试</div>`;
                }
            }
        }

        function renderZbData(data) {
            const headImg = document.getElementById('zb-head-img');
            if (data.head_image) {
                headImg.src = data.head_image;
                headImg.style.display = 'block';
            } else {
                headImg.style.display = 'none';
            }

            document.getElementById('zb-date-display').textContent = data.date;
            const audioBox = document.getElementById('zb-audio-box');
            const audioCtrl = document.getElementById('zb-audio-control');
            const currentSrc = audioCtrl.getAttribute('src');
            if (data.audio) {
                audioBox.style.display = 'block';
                if (currentSrc !== data.audio) {
                    audioCtrl.src = data.audio;
                }
            } else {
                audioBox.style.display = 'none';
            }

            document.getElementById('zb-weiyu-text').textContent = data.weiyu || "新的一天，加油！";

            const newsList = document.getElementById('zb-news-list');
            newsList.innerHTML = '';

            if (data.news && Array.isArray(data.news)) {
                data.news.forEach(itemStr => {
                    const li = document.createElement('li');
                    li.className = 'zb-news-item';
                    const match = itemStr.match(/^(\d+、)(.*)/);
                    if (match) {
                        li.innerHTML = `<span class="zb-news-index">${match[1]}</span><span>${match[2]}</span>`;
                    } else {
                        li.innerHTML = `<span>${itemStr}</span>`;
                    }
                    newsList.appendChild(li);
                });
            }
        }

        // 使用 DOMContentLoaded 确保页面元素加载完成
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initZbNews);
        } else {
            initZbNews();
        }
    })();
</script>
